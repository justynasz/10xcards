name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx astro sync
      - run: npm test
      - run: npm run lint
      - run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

  e2e:
    needs: ci
    runs-on: ubuntu-latest
    # Requires SUPABASE_URL, SUPABASE_KEY, SUPABASE_SERVICE_ROLE_KEY, OPENROUTER_API_KEY,
    # E2E_TEST_EMAIL, E2E_TEST_PASSWORD as repo secrets (dedicated test account — never real
    # user credentials). Blocks deploy (see deploy's `needs` below).
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Write .dev.vars for wrangler dev
        run: |
          cat > .dev.vars <<EOF
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          E2E_TEST_EMAIL=${{ secrets.E2E_TEST_EMAIL }}
          E2E_TEST_PASSWORD=${{ secrets.E2E_TEST_PASSWORD }}
          EOF
      - name: Build (wrangler dev needs a built worker entry-point)
        run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      - name: Start wrangler dev
        run: npx wrangler dev --port 8787 > wrangler-dev.log 2>&1 &
      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8787/ && exit 0
            sleep 2
          done
          echo "Server did not become ready in time" && exit 1
      - run: npx playwright test
      - name: Upload wrangler dev log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: wrangler-dev-log
          path: wrangler-dev.log
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

  deploy:
    needs: [ci, e2e]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      - name: Deploy to Cloudflare Workers
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
